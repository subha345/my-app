<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#0a0a0a; font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a; padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#141414; border:1px solid #222; border-radius:16px; padding:40px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <img src="https://www.subhadatta.com/photos/subha.jpeg"
                   alt="Subhadatta Samal"
                   width="80" height="80"
                   style="border-radius:50%; border:2px solid #6366f1; object-fit:cover;" />
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:4px;">
              <span style="font-size:28px; font-weight:bold; color:#ffffff;">SS<span style="color:#6366f1;">.</span></span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <h1 style="margin:0; font-size:22px; color:#ffffff;">Confirm your email</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <p style="margin:0; font-size:14px; color:#888; line-height:1.6;">
                You're one step away from accessing a suite of handy mini apps — expense splitting, to-do lists, calculators, and more.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0; font-size:14px; color:#ffffff; line-height:1.6;">
                Confirm your email to get started.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block; padding:14px 32px; background-color:#6366f1; color:#ffffff; font-size:14px; font-weight:600; text-decoration:none; border-radius:8px;">
                Confirm Email
              </a>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0; font-size:12px; color:#444;">
                If you didn't sign up, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:32px; border-top:1px solid #222;">
              <p style="margin:0; font-size:12px; color:#444;">
                — Subhadatta Samal &middot; <a href="https://www.subhadatta.com" style="color:#6366f1; text-decoration:none;">subhadatta.com</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
